version: '3'

vars:
  ROOT: '{{.TASKFILE_DIR}}'
  ACTIVE: '{{.TASKFILE_DIR}}/tools/active'
  DISCARDED: '{{.TASKFILE_DIR}}/tools/discarded'
  SITE: '{{.TASKFILE_DIR}}/site'
  CACHE: '{{.TASKFILE_DIR}}/cache'

tasks:
  default:
    cmds:
      - task --list

  sync:
    desc: Sync .venv from pyproject.toml + uv.lock
    status:
      - test -f {{.TASKFILE_DIR}}/.venv/bin/python
      - test uv.lock -nt {{.TASKFILE_DIR}}/.venv/bin/python
    cmds:
      - uv sync

  install:
    desc: Alias for sync
    cmds:
      - task: sync

  add:
    desc: 'Scaffold new tool YAML — usage: task add -- <name>'
    cmds:
      - bash scripts/add_tool.sh "{{.CLI_ARGS}}"

  site:
    desc: Build static site from YAML manifests
    deps: [sync]
    cmds:
      - uv run python scripts/build_site.py
    sources:
      - tools/active/*.yaml
      - tools/discarded/*.yaml
      - templates/**/*
      - cache/versions.json
    generates:
      - site/index.html

  check:
    desc: Query GitHub releases for all active tools, write cache/versions.json
    deps: [sync]
    cmds:
      - uv run python scripts/check_updates.py

  update:
    desc: 'Run update_cmd for tool — usage: task update -- <name>'
    deps: [sync]
    cmds:
      - |
        name="{{.CLI_ARGS}}"
        cmd=$(uv run python -c "import sys,yaml;print(yaml.safe_load(open(sys.argv[1]))['update'])" "{{.ACTIVE}}/${name}.yaml")
        echo "→ ${cmd}"
        eval "${cmd}"

  launch:
    desc: Open tmux 3-pane session (shell | fzf list | help viewer)
    deps: [sync]
    cmds:
      - bash scripts/launch.sh

  recheck:
    desc: List discarded tools past recheck_after date
    deps: [sync]
    cmds:
      - uv run python scripts/recheck_discarded.py

  serve:
    desc: Serve site/ locally on :8000
    dir: site
    cmds:
      - python3 -m http.server 8000

  lock:
    desc: Refresh uv.lock (upgrade deps)
    cmds:
      - uv lock --upgrade

  all:
    desc: check + site
    cmds:
      - task: check
      - task: site
