name: build-site

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: check updates (GitHub releases; local binaries unavailable in CI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python scripts/check_updates.py || true
      - name: build site
        run: uv run python scripts/build_site.py
      - name: commit cache + site
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cache/versions.json site/ || true
          git diff --cached --quiet || git commit -m "chore: nightly versions + site rebuild"
          git push || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
