name: build-site

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * *'   # nightly 04:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: check updates (GitHub releases only — no local binaries available)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # CI has no local binaries, so check_version will mostly error;
          # we still pull latest release tags into cache/versions.json.
          python scripts/check_updates.py || true
      - name: build site
        run: python scripts/build_site.py
      - name: commit cache
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cache/versions.json site/ || true
          git diff --cached --quiet || git commit -m "chore: nightly versions + site rebuild"
          git push || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
