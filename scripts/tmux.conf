# alexshell — project-local tmux config (loaded via tmux -f)

# prefix C-a (less stretchy than default C-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# mouse on (click pane, drag border, scroll)
set -g mouse on

# vi-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# instant pane switch — no prefix
bind -n M-1 select-pane -t 0   # shell (left)
bind -n M-2 select-pane -t 1   # list  (right-top)
bind -n M-3 select-pane -t 2   # help  (right-bottom)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# resize w/o prefix
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 3
bind -n M-Down  resize-pane -D 3

# reload config (prefix r)
bind r run-shell 'tmux source-file "$ALEXSHELL_ROOT/scripts/tmux.conf"' \; display "alexshell config reloaded"

# faster escape (helix/vim friendly)
set -sg escape-time 10

# keep 0-indexed — launch.sh targets $SESSION:0 / panes 0,1,2
set -g base-index 0
setw -g pane-base-index 0

# status bar — hint shortcuts
set -g status-style "bg=#FFF59D,fg=#0B0B0F"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left  " #[bold]alexshell #[default]"
set -g status-right "#[bold]M-1#[default] shell  #[bold]M-2#[default] list  #[bold]M-3#[default] help  #[bold]C-a r#[default] reload "

# active pane highlight
set -g pane-active-border-style "fg=#FF8A65"
set -g pane-border-style "fg=#0B0B0F"

# title
set -g set-titles on
set -g set-titles-string "alexshell — #W"
